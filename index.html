<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NIP Checker — Wyszukiwarka firm</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div class="container">
    <h1>Wyszukiwarka firm po NIP</h1>
    <p class="subtitle">Sprawdź dane firmy — spółki i jednoosobowe działalności gospodarcze</p>

    <div class="api-key-bar">
      <button type="button" id="toggle-api-key" class="api-key-toggle">Klucz API CEIDG</button>
      <span id="api-key-status" class="api-key-status"></span>
      <div id="api-key-panel" class="api-key-panel hidden">
        <p class="api-key-hint">Klucz z <a href="https://dane.biznes.gov.pl/" target="_blank" rel="noopener">dane.biznes.gov.pl</a> — potrzebny do pobierania nazwy firmy z CEIDG.</p>
        <div class="input-group">
          <input type="password" id="api-key-input" placeholder="Wklej klucz API" autocomplete="off" />
          <button type="button" id="save-api-key">Zapisz</button>
          <button type="button" id="clear-api-key" class="btn-danger">Usuń</button>
        </div>
      </div>
    </div>

    <form id="nip-form">
      <div class="input-group">
        <input
          type="text"
          id="nip-input"
          placeholder="Wpisz NIP (np. 5261040828)"
          maxlength="13"
          autocomplete="off"
        />
        <button type="submit" id="search-btn">Szukaj</button>
      </div>
      <p id="error-msg" class="error hidden"></p>
    </form>

    <div id="loading" class="hidden">
      <div class="spinner"></div>
      <p>Wyszukiwanie danych firmy...</p>
    </div>

    <div id="result" class="hidden">
      <div class="result-header">
        <h2>Dane firmy</h2>
        <button id="copy-all-btn" class="copy-btn hidden">Kopiuj wszystko</button>
      </div>
      <table id="company-table">
        <tbody></tbody>
      </table>

      <div id="representatives-section" class="hidden">
        <h3>Osoby reprezentujące</h3>
        <ul id="representatives-list"></ul>
      </div>

      <div id="partners-section" class="hidden">
        <h3>Wspólnicy</h3>
        <ul id="partners-list"></ul>
      </div>

      <div id="bank-accounts-section" class="hidden">
        <h3>Rachunki bankowe (biała lista VAT)</h3>
        <ul id="bank-accounts-list"></ul>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
